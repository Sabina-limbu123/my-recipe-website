{% extends 'base.html' %}
{% block content %}

<h2>Edit Recipe</h2>

<form method="POST">
    <input type="text" name="title" value="{{ recipe.title }}" class="form-control mb-3" required>

    <textarea name="description" class="form-control mb-3" required>{{ recipe.description }}</textarea>

    <textarea name="ingredients" class="form-control mb-3" required>{{ recipe.ingredients }}</textarea>

    <textarea name="instructions" class="form-control mb-3" required>{{ recipe.instructions }}</textarea>

    <button class="btn btn-custom">Update Recipe</button>
</form>

{% endblock %}

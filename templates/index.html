{% extends 'base.html' %}
{% block content %}

<div class="text-center mb-5">
    <h1 class="fw-bold">Welcome to RecipeShare</h1>
    <p class="text-muted">Discover delicious recipes with beautiful presentation</p>
</div>

<div class="row">

    {% for recipe in recipes %}
    <div class="col-md-4 mb-4">

        <div class="card h-100 shadow-sm recipe-card">

            {% if recipe.image %}
            <img src="{{ url_for('static', filename='images/' + recipe.image) }}" class="card-img-top"
                style="height:250px; object-fit:cover;">
            {% endif %}

            <div class="card-body d-flex flex-column">

                <h5 class="card-title fw-bold">{{ recipe.title }}</h5>

                <p class="card-text text-muted">
                    {{ recipe.description[:100] }}...
                </p>

                <div class="mt-auto">
                    <a href="{{ url_for('recipe_detail', id=recipe.id) }}" class="btn btn-custom w-100">
                        View Recipe
                    </a>
                </div>

            </div>

        </div>

    </div>
    {% endfor %}

</div>

{% endblock %}

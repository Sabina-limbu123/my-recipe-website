{% extends 'base.html' %}
{% block content %}

<h2>My Recipes</h2>

<a href="{{ url_for('add_recipe') }}" class="btn btn-custom mb-3">Add New Recipe</a>

<table class="table table-bordered">
    <tr>
        <th>Title</th>
        <th>Actions</th>
    </tr>

    {% for recipe in recipes %}
    <tr>
        <td>{{ recipe.title }}</td>
        <td>
            <a href="{{ url_for('edit_recipe', id=recipe.id) }}" class="btn btn-sm btn-warning">Edit</a>
            <a href="{{ url_for('delete_recipe', id=recipe.id) }}" class="btn btn-sm btn-danger">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
